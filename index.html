<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Utah — 3D Terrain Map</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #0a0a0a; font-family: 'SF Mono', 'Fira Code', monospace; }
    #game-canvas { display: block; width: 100vw; height: 100vh; }
    #ui-overlay {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      pointer-events: none; z-index: 10;
    }
    #ui-overlay > * { pointer-events: auto; }
    #loading-screen {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      background: #0a0a0a; display: flex; flex-direction: column;
      align-items: center; justify-content: center; z-index: 1000;
      transition: opacity 0.6s ease-out;
    }
    #loading-screen.hidden { opacity: 0; pointer-events: none; }
    #loading-title {
      font-size: 48px; font-weight: 700; color: #c45b28;
      letter-spacing: 12px; text-transform: uppercase; margin-bottom: 32px;
    }
    #loading-subtitle {
      font-size: 14px; color: #8a7a6a; letter-spacing: 4px; margin-bottom: 48px;
    }
    #loading-bar-bg {
      width: 320px; height: 3px; background: #1a1a1a; border-radius: 2px;
    }
    #loading-bar {
      height: 100%; width: 0%; background: #c45b28; border-radius: 2px;
      transition: width 0.3s ease-out;
    }
    #loading-status {
      font-size: 11px; color: #555; margin-top: 16px; letter-spacing: 2px;
    }
  </style>
</head>
<body>
  <canvas id="game-canvas"></canvas>
  <div id="ui-overlay"></div>
  <div id="loading-screen">
    <div id="loading-title">UTAH</div>
    <div id="loading-subtitle">3D TERRAIN VISUALIZATION</div>
    <div id="loading-bar-bg"><div id="loading-bar"></div></div>
    <div id="loading-status">Initializing...</div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
